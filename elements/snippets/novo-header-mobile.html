<style>
    @media (min-width: 768px){
        .cabecalho-mobile{
            display: none;
        }
    }

    .cabecalho-mobile{
        position: fixed;
        width: 100%;
        bottom: 0;
        background-color: var(--cor_cabecalho_flut_bg);
        z-index: 18;
        max-height: 90px;
        box-shadow: 0px 0px 50px -10px rgba(0,0,0,0.1);
        opacity: 1;
        transition: max-height 0.5s ease-in-out;
    }

    .cabecalho-mobile:not(.show){
        max-height: 0;
        opacity: 0;
    }

    .header-itens{
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin: 10px;
    }

    .header-item{
        width: calc(100% / 6);
        padding: 3px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .h-texto{
        font-size: 13px;
        font-weight: 400;
    }
    
    .cabecalho-mobile .cart-quantity{
        position: absolute;
        top: -2px;
        right: 13px;
        border-radius: 50%;
        width: 15px;
        height: 15px;
        font-size: 10px;
        font-weight: 500;
        background-color: var(--cor_cabecalho_flut_bg_cart);
        color: var(--cor_cabecalho_flut_text_cart);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .h-search{
        position: fixed;
        width: 100%;
        bottom: 0;
        display: none;
        box-shadow: 0px 0px 50px 5px rgba(0,0,0,0.1);
    }

    .cabecalho-mobile .header-search-wrapper{
        border-bottom: 1px solid var(--color_gray_medium);
    }

    .cabecalho-mobile svg{
        color: var(--cor_cabecalho_flut_icon);
    }

    .cabecalho-mobile .h-texto{
        color: var(--cor_cabecalho_flut_text);
    }


</style>

<header class="cabecalho-mobile">
    <div class="h-search">
        {% element 'snippets/header-search' %}
    </div>

    <div class="header-itens">
        <a class="header-item h-menu" data-toggle="overlay-shadow" {% if settings.menu_tipo == '0'%}data-target="#menu-mobile"{%else%}data-target="#menu-lateral"{%endif%}>
            <div class="h-icone">
                <svg style="margin-bottom: -5px;" xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </div>

            <div class="h-texto">
                Menu
            </div>
        </a>

        <a class="header-item h-busca">
            <div class="h-icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </div>

            <div class="h-texto">
                Buscar
            </div>
        </a>

        {% if settings.exibir_header_bottom_pedidos == '1'%}
            <a href="{{ links.orders }}" class="header-item h-pedidos">
                <div class="h-icone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-box-seam" viewBox="0 0 16 16">
                        <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5l2.404.961L10.404 2l-2.218-.887zm3.564 1.426L5.596 5 8 5.961 14.154 3.5l-2.404-.961zm3.25 1.7-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
                    </svg>
                </div>

                <div class="h-texto">
                    Pedidos
                </div>
            </a>
        {% endif %}

        <a href="{{ links.central }}" class="header-item h-conta">
            <div class="h-icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                </svg>
            </div>

            <div class="h-texto">
                Conta
            </div>
        </a>

        {% if settings.exibir_header_bottom_ofertas == '1'%}
            <a href="{{ links.search_offer }}" class="header-item h-ofertas">
                <div class="h-icone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-tag" viewBox="0 0 16 16">
                        <path d="M6 4.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm-1 0a.5.5 0 1 0-1 0 .5.5 0 0 0 1 0z"/>
                        <path d="M2 1h4.586a1 1 0 0 1 .707.293l7 7a1 1 0 0 1 0 1.414l-4.586 4.586a1 1 0 0 1-1.414 0l-7-7A1 1 0 0 1 1 6.586V2a1 1 0 0 1 1-1zm0 5.586 7 7L13.586 9l-7-7H2v4.586z"/>
                    </svg>
                </div>

                <div class="h-texto">
                    Ofertas
                </div>
            </a>
        {% endif %}

        <a href="{{ links.cart }}" class="header-item h-carrinho">
            <div class="h-icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-cart2" viewBox="0 0 16 16">
                    <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5zM3.14 5l1.25 5h8.22l1.25-5H3.14zM5 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0zm9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0z"/>
                </svg>
            </div>

            <div class="cart-quantity" data-cart="amount">0</div>

            <div class="h-texto">
                Carrinho
            </div>
        </a>
    </div>
</header>
